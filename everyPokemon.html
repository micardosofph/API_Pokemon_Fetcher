<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Every Pokémon</title>
</head>

<body style="display: flex; flex-direction: column; justify-content: normal;">

    <div style="display: flex;flex-direction: row; align-items: center ;justify-content: space-evenly;">
        <h1 style="position: absolute;">Every Pokémon from the PokéAPI</h1>
        <div style="text-align: center;">
            <p>Go back to the Pokémon Fetcher</p>
            <a href="index.html">Click here</a>
        </div>
        <input type="text" id="pokemonNameInput" placeholder="Type here the name of the Pokémon" oninput="teste()" class="inputNomePokemon">
    </div>
    <div class="framePrincipalEveryPokemon">

        <div class="grid-container">
            <div class="pagination">
                <p id="pokemonCounter"></p>
                <div>
                    <button id="prevBtn" onclick="changePage(-1)">Previous</button>
                    <span id="pageIndicator">Page 1</span>
                    <button id="nextBtn" onclick="changePage(1)">Next</button>
                </div>
            </div>

            <div class="gridPokemons" id="pokemonGrid">
            </div>
        </div>
    </div>

    <script src="everyPokemon.js"></script>
    <script src="onTypeSearchScript.js"></script>
</body>

</html>
